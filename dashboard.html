<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ain Alassima Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1d2a;
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: #112b3c;
      padding: 20px;
      border-radius: 12px;
    }

    .card h3 {
      margin: 0 0 10px;
      color: gold;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .actions {
      margin-top: 25px;
      display: grid;
      gap: 12px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    button {
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: gold;
      color: #0b1d2a;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .box {
      background: #112b3c;
      padding: 20px;
      border-radius: 12px;
      margin: 25px auto 0;
      max-width: 500px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: white;
      color: black;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
    }

    th {
      background: gold;
      color: #0b1d2a;
    }
  </style>
</head>
<body>

  <h1>💎 Ain Alassima Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h3>إجمالي الرصيد</h3>
      <div class="value">0.00</div>
    </div>

    <div class="card">
      <h3>إجمالي الأرباح</h3>
      <div class="value">0.00</div>
    </div>

    <div class="card">
      <h3>عدد العمليات</h3>
      <div class="value">0</div>
    </div>
  </div>

  <div class="actions">
    <button onclick="showForm()">إضافة عملية جديدة</button>
    <button onclick="alert('صفحة العملاء بعدين')">العملاء</button>
    <button onclick="alert('صفحة التقارير بعدين')">التقارير</button>
  </div>

  <div class="box" id="formBox" style="display:none;">
    <h3>إضافة عملية</h3>
    <input id="amount" type="number" placeholder="القيمة" style="padding:10px; width:80%; border-radius:8px; border:none;"><br><br>
    <button onclick="addTransaction()">حفظ العملية</button>
  </div>

  <div class="box">
    <h3>آخر العمليات</h3>
    <table id="transactionsTable">
      <tr>
        <th>القيمة</th>
      </tr>
    </table>
  </div>

  <script>
    function showForm() {
      document.getElementById("formBox").style.display = "block";
    }

    function addTransaction() {
      const amount = document.getElementById("amount").value;
      if (!amount) {
        alert("اكتب قيمة أولاً");
        return;
      }

      const table = document.getElementById("transactionsTable");
      const row = table.insertRow();
      const cell = row.insertCell(0);
      cell.innerHTML = amount;

      document.getElementById("amount").value = "";
      alert("تمت إضافة العملية");
    }
  </script>

</body>
</html
