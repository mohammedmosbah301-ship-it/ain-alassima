<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ain Alassima</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1d2a;
      color: white;
      text-align: center;
      padding: 50px;
      margin: 0;
    }

    .box {
      background: #112b3c;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      margin: auto;
    }

    input {
      padding: 12px;
      margin: 10px 0;
      width: 80%;
      border-radius: 6px;
      border: none;
      font-size: 18px;
    }

    button {
      padding: 12px 24px;
      background: gold;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    h3 {
      font-size: 28px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>💎 Ain Alassima</h1>

  <div class="box">
    <h3>تسجيل الدخول</h3>
    <input id="email" type="email" placeholder="Email" /><br />
    <input id="password" type="password" placeholder="Password" /><br />
    <button onclick="login()">دخول</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://adhjtzholueecrrurfmo.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkaGp0emhvbHVlZWNycnVyZm1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDUwMDgsImV4cCI6MjA5MDQ4MTAwOH0.18sA7GwWwRhZuY4FLhYFQXv5lIRcPsZTh30TMf7ImRw";

    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        alert("خطأ: " + error.message);
      } else {
        alert("تم تسجيل الدخول بنجاح");
      }
    }
  </script>

</body>
</html>
